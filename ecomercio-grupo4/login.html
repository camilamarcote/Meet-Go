<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.min.css"
    rel="stylesheet"
  />

  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
  />

  <link rel="stylesheet" href="css/login.css">

  <link rel="shortcut icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">

  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

  <link rel="manifest" href="img/site.webmanifest">
</head>

<body class="login-bg d-flex align-items-center justify-content-center vh-100">

  <div class="card p-4 shadow-lg login-card">
    <img src="img/LOGO (1).svg" alt="Meet&Go Logo" class="mb-3">

    <form id="loginForm">

      <div class="mb-3">
        <input
          type="text"
          id="loginUser"
          placeholder="Email o Usuario"
          required
          class="form-control"
        >
      </div>

      <div class="mb-3 position-relative">
        <input
          type="password"
          id="loginPass"
          placeholder="Contraseña"
          required
          class="form-control pe-5"
        >

        <button
          type="button"
          id="togglePassword"
          aria-label="Mostrar contraseña"
        >
          <i id="eyeIcon" class="fa-regular fa-eye-slash"></i>
        </button>
        
        <div class="text-center mt-3">
          <a href="forgot-password.html" class="text-decoration-none">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </div>

      <button class="btn btn-primary w-100">Ingresar</button>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.min.js"></script>

  <script src="js/login.js"></script>
</body>
</html>
