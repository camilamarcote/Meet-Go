<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar eventos - Meet&Go</title>

  <!-- Bootstrap -->
  <link href="css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Estilos -->
  <link href="css/explorar.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Favicons -->
  <link rel="shortcut icon" href="img/favicon.ico">
</head>

<body>

  <div id="navbar-container"></div>

  <main class="container my-5">

    <!-- ⭐ Banner suscripción -->
    <div id="subscription-banner" class="card border-warning mb-5 shadow-sm">
      <div class="card-body d-md-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-1">⭐ Suscripción Meet&Go</h5>
          <p class="mb-0 text-muted">
            Accedé a eventos pagos sin costo adicional con un plan mensual.
          </p>
        </div>
        <a href="suscripcion.html" class="btn btn-warning mt-3 mt-md-0">
          Ver planes
        </a>
      </div>
    </div>

    <!-- Eventos -->
    <h2 class="text-center mb-4">Eventos publicados</h2>
    <div id="eventsContainer" class="row g-4"></div>

  </main>

  <!-- 🔒 MODAL PERFIL -->
  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>✨ Actualización de perfil</h3>
      <p>
        Antes de explorar eventos, necesitamos conocerte un poquito más
        para ofrecerte mejores experiencias.
      </p>

      <button onclick="goToProfile()" class="btn-primary">
        Completar perfil
      </button>

      <p class="small-text">
        Solo toma 2 minutos 💫
      </p>
    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/explorar.js"></script>
  <script src="js/init.js"></script>

</body>
</html>
