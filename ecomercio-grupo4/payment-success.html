<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pago confirmado | Meet&Go</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    max-width:400px;
}

h2{
    color:#27ae60;
    margin-bottom:10px;
}

p{
    color:#555;
}

.loader{
    margin:20px auto;
    border:4px solid #eee;
    border-top:4px solid #27ae60;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.small{
    font-size:14px;
    color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>Compra realizada 🎉</h2>

<p>Estamos confirmando tu pago.</p>

<div class="loader"></div>

<p class="small">Serás redirigido a tus eventos...</p>

</div>

<script>

setTimeout(() => {

  window.location.href = "/myevents.html";

}, 3500);

</script>

</body>
</html>
