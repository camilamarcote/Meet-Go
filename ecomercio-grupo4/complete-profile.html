<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete profile</title>

  <link rel="stylesheet" href="css/complete-profile.css">

  <!-- Cargar JS al final -->
</head>
<body>

 <form id="experienceForm">

  <h2>✨ Tu perfil de experiencia</h2>
  <p class="subtitle">
    Estas respuestas nos ayudan a crear dinámicas y encuentros donde te sientas cómodx.
  </p>

  <!-- ===================== -->
  <!-- 🌟 INTERESES -->
  <!-- ===================== -->
  <section class="form-section">
    <h3>🌟 Intereses</h3>
    <p>Elegí los temas que más te representan</p>

    <div class="checkbox-grid">
      <label><input type="checkbox" name="interests" value="musica"> Música</label>
      <label><input type="checkbox" name="interests" value="cine"> Cine</label>
      <label><input type="checkbox" name="interests" value="lectura"> Lectura</label>
      <label><input type="checkbox" name="interests" value="arte"> Arte</label>
      <label><input type="checkbox" name="interests" value="viajes"> Viajes</label>
      <label><input type="checkbox" name="interests" value="naturaleza"> Naturaleza</label>
      <label><input type="checkbox" name="interests" value="activismo"> Activismo</label>
      <label><input type="checkbox" name="interests" value="juegos"> Juegos</label>
      <label><input type="checkbox" name="interests" value="cafe"> Café</label>
      <label><input type="checkbox" name="interests" value="senderismo"> Senderismo</label>
      <label><input type="checkbox" name="interests" value="museos"> Museos</label>
      <label><input type="checkbox" name="interests" value="social"> Redes sociales</label>
    </div>
  </section>

  <!-- ===================== -->
  <!-- 🌿 PERSONALIDAD -->
  <!-- ===================== -->
  <section class="form-section">
    <h3>🌿 Tu forma de ser</h3>

    <label>¿Cómo describirías tu energía social?</label>
    <select name="personality" required>
      <option value="">Seleccionar…</option>
      <option value="introvertida">Introvertida</option>
      <option value="ambivertida">Ambivertida</option>
      <option value="extrovertida">Extrovertida</option>
    </select>

  <!-- ===================== -->
  <!-- 🎲 ICEBREAKERS -->
  <!-- ===================== -->
  <section class="form-section">
    <h3>🎲 Para romper el hielo</h3>

    <label>🎬 Película o serie que amás</label>
    <input name="favoriteMovie" required>

    <label>🎵 Canción que te representa</label>
    <input name="favoriteSong" required>

    <label>🍝 Comida que te hace feliz</label>
    <input name="favoriteFood">

    <label>✈️ Viaje soñado</label>
    <input name="dreamTrip">
  </section>

  <!-- ===================== -->
  <!-- 🧠 DINÁMICA SOCIAL -->
  <!-- ===================== -->
  <section class="form-section">
    <h3>🧠 En los encuentros</h3>

    <label>¿Cómo te sentís en grupos?</label>
    <select name="groupPreference" required>
      <option value="">Elegir…</option>
      <option value="small">Me siento mejor en grupos chicos</option>
      <option value="medium">Me adapto según el contexto</option>
      <option value="large">Me gustan los grupos grandes</option>
    </select>

    <label>Preferís charlas:</label>
    <select name="conversationStyle">
      <option value="">Elegir…</option>
      <option value="deep">Profundas</option>
      <option value="light">Livianas</option>
      <option value="mixed">Un poco de todo</option>
    </select>

    <label>¿Solés iniciar conversaciones?</label>
    <select name="initiatesConversation">
      <option value="">Elegir…</option>
      <option value="yes">Sí</option>
      <option value="no">No</option>
      <option value="depends">Depende del ambiente</option>
    </select>
  </section>

  <!-- ===================== -->
  <!-- 🎯 EXPECTATIVAS -->
  <!-- ===================== -->
  <section class="form-section">
    <h3>🎯 Qué buscás en los encuentros</h3>

    <div class="checkbox-grid">
      <label><input type="checkbox" name="lookingFor" value="friends"> Hacer amistades</label>
      <label><input type="checkbox" name="lookingFor" value="dating"> Conocer a alguien especial</label>
      <label><input type="checkbox" name="lookingFor" value="networking"> Conectar con personas afines</label>
      <label><input type="checkbox" name="lookingFor" value="experiences"> Vivir experiencias nuevas</label>
    </div>
  </section>

  <button type="submit" class="primary-btn">
    Guardar y continuar ✨
  </button>

</form>
  
</body>
<script src="js/complete-profile.js"></script>

</html>
