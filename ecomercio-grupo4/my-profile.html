<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi perfil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS compartido con register -->
  <link rel="stylesheet" href="css/forms.css">

  <!-- Favicons -->
  <link rel="icon" href="img/favicon/favicon.ico">
</head>

<body>
<div id="navbar-container"></div>

<div class="app-container">
<form id="profileForm" enctype="multipart/form-data">


<h2>👋 Mi perfil</h2>

<div class="card">
  <label>Nombre*</label>
  <input name="firstName" required>

  <label>Apellido*</label>
  <input name="lastName" required>

  <label>Usuario*</label>
  <input name="username" required>

  <label>Email*</label>
  <input type="email" name="email" required>

  <label>Edad*</label>
  <input type="number" name="age" min="18" required>

  <!-- 🌎 NACIONALIDAD -->
  <label>Nacionalidad*</label>
  <select name="nationality" required>
    <option value="">Seleccionar...</option>
    <option>Uruguaya</option>
    <option>Argentina</option>
    <option>Brasileña</option>
    <option>Chilena</option>
    <option>Paraguaya</option>
    <option>Boliviana</option>
    <option>Peruana</option>
    <option>Colombiana</option>
    <option>Venezolana</option>
    <option>Mexicana</option>
    <option>Española</option>
    <option>Italiana</option>
    <option>Francesa</option>
    <option>Alemana</option>
    <option>Estadounidense</option>
    <option>Canadiense</option>
    <option>Otra</option>
  </select>

  <!-- 🏙️ DEPARTAMENTO -->
  <label>Departamento</label>
  <select name="department">
    <option value="">Seleccionar...</option>
    <option>Artigas</option>
    <option>Canelones</option>
    <option>Cerro Largo</option>
    <option>Colonia</option>
    <option>Durazno</option>
    <option>Flores</option>
    <option>Florida</option>
    <option>Lavalleja</option>
    <option>Maldonado</option>
    <option>Montevideo</option>
    <option>Paysandú</option>
    <option>Río Negro</option>
    <option>Rivera</option>
    <option>Rocha</option>
    <option>Salto</option>
    <option>San José</option>
    <option>Soriano</option>
    <option>Tacuarembó</option>
    <option>Treinta y Tres</option>
  </select>

  <label>Foto de perfil</label>
  <input type="file" name="profileImage" accept="image/*">
</div>

<!-- ⭐ INTERESES -->
<h3>✨ Intereses</h3>
<div class="card checkbox-card">
  <label><input type="checkbox" name="interests" value="musica"> Música</label>
  <label><input type="checkbox" name="interests" value="cine"> Cine</label>
  <label><input type="checkbox" name="interests" value="lectura"> Lectura</label>
  <label><input type="checkbox" name="interests" value="deporte"> Deporte</label>
  <label><input type="checkbox" name="interests" value="viajes"> Viajes</label>
  <label><input type="checkbox" name="interests" value="arte"> Arte</label>

  <!-- extras que ya tenías -->
  <label><input type="checkbox" name="interests" value="senderismo"> Senderismo</label>
  <label><input type="checkbox" name="interests" value="cafe"> Café</label>
  <label><input type="checkbox" name="interests" value="museos"> Museos</label>
  <label><input type="checkbox" name="interests" value="juegos"> Juegos</label>
  <label><input type="checkbox" name="interests" value="salir"> Salir</label>
</div>

<!-- 🌿 PERSONALIDAD -->
<h3>🌿 Personalidad</h3>
<div class="card">

  <label>Temperamento</label>
  <select name="personality">
    <option value="">Seleccionar...</option>
    <option>Introvertido/a</option>
    <option>Ambivertido/a</option>
    <option>Extrovertido/a</option>
  </select>

  <label>Estilo social</label>
  <label><input type="radio" name="style" value="grupos"> Grupos grandes</label>
  <label><input type="radio" name="style" value="pequenos"> Grupos pequeños</label>
  <label><input type="radio" name="style" value="uno"> 1 a 1</label>

  <!-- 🗣️ IDIOMAS -->
  <label>Idiomas</label>
  <div class="checkbox-card">
    <label><input type="checkbox" name="languages" value="espanol"> Español</label>
    <label><input type="checkbox" name="languages" value="ingles"> Inglés</label>
    <label><input type="checkbox" name="languages" value="portugues"> Portugués</label>
    <label><input type="checkbox" name="languages" value="frances"> Francés</label>
    <label><input type="checkbox" name="languages" value="italiano"> Italiano</label>
    <label><input type="checkbox" name="languages" value="aleman"> Alemán</label>
    <label><input type="checkbox" name="languages" value="otro"> Otro</label>
  </div>

  <label>Biografía</label>
  <textarea name="bio" rows="4"></textarea>
</div>

<button type="submit" class="btn-primary">
  Confirmar cambios 
</button>

</form>
</div>

  <script src="js/my-profile.js"></script>
</body>
</html>
