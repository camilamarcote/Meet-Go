<!DOCTYPE html>
<html lang="es"> 

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet&Go</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu hoja de estilos -->
  <link href="css/styles.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@200;300;400;500&display=swap" rel="stylesheet">
<!-- Favicon básico -->
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="icon" type="image/x-icon" href="img/favicon.ico">

<!-- Favicons PNG -->
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

<!-- Apple Touch -->
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

<!-- Manifest -->
<link rel="manifest" href="img/site.webmanifest">



</head>

<body>
  <div id="navbar-container"></div>


  <main>
    <div data-aos="zoom-in">
      <div class="logo-MeetGo">
         <img src="img/LOGO (1).svg" alt="Logo">
         </div>
          <h2 class="subtitulo-bienvenida">Tu espacio para conocer gente</h2>
    </div>

<section class="container my-5">

  <h2 class="text-center mb-4">Momentos Meet&Go</h2>

  <div id="eventsCarousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner" id="eventsCarouselInner">
      <!-- Slides generados por JS -->
    </div>

    <!-- Controles -->
    <button class="carousel-control-prev" type="button" data-bs-target="#eventsCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#eventsCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

</section>

<!-- SECCIÓN ALIANZAS -->
<section class="partners-section">
  <div class="partners-inner container">

    <h3 class="partners-title">Emprendimientos aliados</h3>

    <div class="partners-logos">



      <img src="img/ronda.png" alt="Logo Ronda">
      <img src="img/nomade.png" alt="Logo Nomade">
      <img src="img/salvo.png" alt="Logo Visitas al Palacio Salvo">
      <img src="img/demode.png" alt="Logo Demodé">
      <img src="img/pitamiglio.png" alt="Logo Pitamiglio">
      <img src="img/doña.png" alt="Logo Doña Marta">
      <img src="img/Sansueña (2).png" alt="Logo Sansueña">
       <img src="img/nudoescudo.jpg" alt="Logo Nudo Escudo">
    </div>
  </div>
</section>


  

  <!-- Scripts -->
  <script src="js/bootstrap.bundle.min.js"></script>
   <script src="js/init.js"></script>
  <script src="js/index.js"></script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 1200,
      easing: 'ease-out-cubic',
      once: true
    });
  </script>
</body>

</html>
