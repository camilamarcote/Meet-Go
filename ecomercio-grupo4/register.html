<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <link rel="stylesheet" href="css/forms.css">
  <!-- Favicon básico -->
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="icon" type="image/x-icon" href="img/favicon.ico">

<!-- Favicons PNG -->
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

<!-- Apple Touch -->
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

<!-- Manifest -->
<link rel="manifest" href="img/site.webmanifest">
</head>

<body>
<div class="app-container">
<form id="registerForm"> 

<h2>👋 Registro</h2>

<div class="card">
  <label>Nombre*</label>
  <input name="firstName" required>

  <label>Apellido*</label>
  <input name="lastName" required>

  <label>Usuario*</label>
  <input name="username" required>

  <label>Email*</label>
  <input type="email" name="email" required>

    <label>Contraseña*</label>
  <input
    type="password"
    name="password"
    required
    minlength="8"
    autocomplete="new-password"
    placeholder="Mín. 8 caracteres, mayúscula, número y símbolo"
  />
  <small>
    Debe incluir mayúscula, minúscula, número y carácter especial
  </small>

  <label>Edad*</label>
  <input type="number" name="age" min="18" required>

  <label>Celular*</label>
<input type="text" name="phone" required placeholder="+598 9XXXXXXX">

  <!-- 🌎 NACIONALIDAD -->
  <label>Nacionalidad*</label>
  <select name="nationality" required>
    <option value="">Seleccionar...</option>
    <option>Uruguaya</option>
    <option>Argentina</option>
    <option>Brasileña</option>
    <option>Chilena</option>
    <option>Paraguaya</option>
    <option>Boliviana</option>
    <option>Peruana</option>
    <option>Colombiana</option>
    <option>Venezolana</option>
    <option>Mexicana</option>
    <option>Española</option>
    <option>Italiana</option>
    <option>Francesa</option>
    <option>Alemana</option>
    <option>Estadounidense</option>
    <option>Canadiense</option>
    <option>Otra</option>
  </select>

  <!-- 🏙️ DEPARTAMENTO -->
  <label>Departamento</label>
  <select name="department">
    <option value="">Seleccionar...</option>
    <option>Artigas</option>
    <option>Canelones</option>
    <option>Cerro Largo</option>
    <option>Colonia</option>
    <option>Durazno</option>
    <option>Flores</option>
    <option>Florida</option>
    <option>Lavalleja</option>
    <option>Maldonado</option>
    <option>Montevideo</option>
    <option>Paysandú</option>
    <option>Río Negro</option>
    <option>Rivera</option>
    <option>Rocha</option>
    <option>Salto</option>
    <option>San José</option>
    <option>Soriano</option>
    <option>Tacuarembó</option>
    <option>Treinta y Tres</option>
  </select>

  <label>Foto de perfil</label>
  <input type="file" name="profileImage" accept="image/*">
</div>

<button type="submit" class="btn-primary">
  Finalizar registro
</button>

</form>
</div>

<script src="js/register.js"></script>
</body>
</html>
