<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/styles.css" rel="stylesheet">
  <!-- Favicon básico -->
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="icon" type="image/x-icon" href="img/favicon.ico">

<!-- Favicons PNG -->
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

<!-- Apple Touch -->
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

<!-- Manifest -->
<link rel="manifest" href="img/site.webmanifest">
</head>

<body>

   <div id="navbar-container"></div>
<div class="app-container">
<form id="registerForm"> 

<h2>👋 Registro</h2>

<div class="card">
  <label>Nombre*</label>
  <input name="firstName" required>

  <label>Apellido*</label>
  <input name="lastName" required>

  <label>Email*</label>
  <input type="email" name="email" required>

    <label>Contraseña*</label>
  <input
    type="password"
    name="password"
    required
    minlength="8"
    autocomplete="new-password"
    placeholder="Mín. 8 caracteres, mayúscula, número y símbolo"
  />
  <small>
    Debe incluir mayúscula, minúscula, número y carácter especial
  </small>

  <label>Edad*</label>
  <input type="number" name="age" min="18" required>

  <label>Celular*</label>
<input type="text" name="phone" required placeholder="+598 9XXXXXXX">

<section class="form-section">
    <h3>Intereses</h3>
    <p>Elegí las actividades que mas te gustan</p>

    <div class="checkbox-grid">
      <label><input type="checkbox" name="interests" value="musica"> Planes gastronómicos</label>
      <label><input type="checkbox" name="interests" value="cine"> Cine</label>
      <label><input type="checkbox" name="interests" value="lectura"> Musica</label>
      <label><input type="checkbox" name="interests" value="arte"> Ir a museos</label>
      <label><input type="checkbox" name="interests" value="viajes"> Teatro</label>
      <label><input type="checkbox" name="interests" value="naturaleza"> Actividades al aire libre</label>
      <label><input type="checkbox" name="interests" value="activismo"> Ir a librerías</label>
      <label><input type="checkbox" name="interests" value="juegos"> Juegos de mesa</label>
      <label><input type="checkbox" name="interests" value="cafe"> Tardes de café</label>
      <label><input type="checkbox" name="interests" value="senderismo"> Actividades deportivas</label>
    </div>
  </section>

 
<button type="submit" class="btn-primary">
  Finalizar registro
</button>

</form>
</div>

<script src="js/init.js"></script>
<script src="js/register.js"></script>
</body>
</html>
